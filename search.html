<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>البحث | عراقي إيكو</title>

    <meta name="description"
          content="البحث في قاعدة بيانات الكائنات الحية في العراق">

    <link rel="icon" href="favicon.ico">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/utilities.css">
    <link rel="stylesheet" href="css/search.css">
    <link rel="stylesheet" href="css/dark.css">

</head>

<body>

<header class="header">

    <div class="container header-container">

        <a class="logo"
           href="index.html">

            <img class="logo-image"
                 src="assets/logo/logo.png"
                 alt="عراقي إيكو">

            <div>

                <h1 class="logo-title"
                    data-i18n="site.name">
                    عراقي إيكو
                </h1>

                <p class="logo-description"
                   data-i18n="site.description">
                    قاعدة بيانات الكائنات الحية في العراق
                </p>

            </div>

        </a>

    </div>

</header>

<main>

<section class="section">

<div class="container">

<h2 class="section-title"
    data-i18n="nav.search">
    البحث
</h2>

<form id="search-form"
      class="search-box">

<input
    id="search-input"
    type="search"
    class="input"
    data-i18n-placeholder="search.placeholder"
    placeholder="ابحث...">

<button
    class="btn btn-primary"
    type="submit"
    data-i18n="search.button">
    بحث
</button>

</form>

<div id="search-results"
     class="grid grid-4 mt-6">

</div>

</div>

</section>

</main>

<footer class="footer">

<div class="container">

<p data-i18n="footer.rights">

جميع الحقوق محفوظة © عراقي إيكو

</p>

</div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script type="module"
        src="js/search-page.js"></script>

</body>

</html>
